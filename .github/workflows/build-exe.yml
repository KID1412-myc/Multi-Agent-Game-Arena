name: Build MAGA EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build EXE
        run: python -m PyInstaller maga.spec --noconfirm

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MAGA.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

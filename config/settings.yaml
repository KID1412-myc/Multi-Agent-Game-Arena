# ============================================
# MAGA 全局配置
# ============================================

# 游戏目录
games_dir: games

# 日志级别: DEBUG | INFO | WARNING | ERROR
log_level: INFO

# 引擎默认参数
engine:
  # 默认回合超时（秒）
  default_timeout: 60
  # 模型调用重试次数
  max_retries: 2
  # 重试延迟基础值（秒）
  retry_delay: 2.0
  # 全局热记忆窗口（轮）
  global_hot_window: 3
  # 玩家热记忆窗口（轮）
  player_hot_window: 5
  # 发言间隔（秒，让前端有时间展示动画）
  speech_interval: 0.5

# 速率限制（每模型每秒最大请求数）
rate_limits:
  openai: 10
  anthropic: 5
  gemini: 15
  deepseek: 5
  doubao: 3
  minimax: 5
  zhipu: 5
  openai_compatible: 20
  relay: 20          # 中转站一般无限制或很高

# 成本估算（每 1K tokens 的美元价格，2026年参考值）
pricing_per_1k:
  gpt-5.4: { input: 0.0025, output: 0.010 }
  gpt-4o: { input: 0.0025, output: 0.010 }
  claude-opus-4-8: { input: 0.015, output: 0.075 }
  claude-sonnet-4-6: { input: 0.003, output: 0.015 }
  claude-haiku-4-5: { input: 0.001, output: 0.005 }
  gemini-3.0-pro: { input: 0.00125, output: 0.005 }
  gemini-3.0-flash: { input: 0.000075, output: 0.0003 }
  deepseek-v3: { input: 0.00027, output: 0.0011 }
  deepseek-reasoner: { input: 0.00055, output: 0.00219 }

# WebSocket
websocket:
  ping_interval: 25
  ping_timeout: 10
  max_connections: 20
